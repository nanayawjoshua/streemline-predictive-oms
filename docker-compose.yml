services:
  prediction-engine:
    build:
      context: prediction-engine
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - ZONE_RISK_ENABLED=true
      - TRANSFORMER_RISK_ENABLED=false
      - HITL_ENABLED=true
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  go-connector:
    build:
      context: go-connector
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PREDICTION_URL=http://prediction-engine:8001
      - CONNECTOR_PORT=8002
    depends_on:
      prediction-engine:
        condition: service_healthy

  dashboard:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - prediction-engine
